name: "slop-scorecard"
description: "Free deterministic AI-slop scorecard for a codebase — duplication, phantom imports, hallucinated dependencies, dead exports, secrets, dependency CVE/staleness. No LLM calls, no cloud upload of your source (see codereckon.com)."
branding:
  icon: "shield"
  color: "red"

inputs:
  path:
    description: "Directory to scan, relative to the calling repo's checkout root."
    required: false
    default: "."
  offline:
    description: "Skip network-dependent checks (hallucinated-deps, dependency-risk)."
    required: false
    default: "false"
  comment-pr:
    description: "Post/update a summary comment on the triggering pull request, if any."
    required: false
    default: "true"
  github-token:
    description: "Token used to post the PR comment. Defaults to the workflow's automatic token."
    required: false
    default: ${{ github.token }}

outputs:
  overall-grade:
    description: "Overall letter grade (A-F)."
    value: ${{ steps.scan.outputs.overall-grade }}
  slop-index:
    description: "AI-Slop Index, 0-100, lower is better."
    value: ${{ steps.scan.outputs.slop-index }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: "22"

    - name: Install slop-scorecard
      shell: bash
      # ${{ github.action_path }} is this action's own checked-out source (this repo,
      # pinned to whatever ref the consumer referenced), independent of the calling repo.
      run: |
        cd "${{ github.action_path }}"
        npm ci

    - name: Run scorecard
      id: scan
      shell: bash
      run: |
        set -e
        ACTION_DIR="${{ github.action_path }}"
        TARGET="${{ inputs.path }}"
        OFFLINE_FLAG=""
        if [ "${{ inputs.offline }}" = "true" ]; then OFFLINE_FLAG="--offline"; fi

        mkdir -p "$GITHUB_WORKSPACE/.slop-scorecard"
        (cd "$ACTION_DIR" && npx tsx src/cli.ts "$GITHUB_WORKSPACE/$TARGET" \
          --out "$GITHUB_WORKSPACE/.slop-scorecard" $OFFLINE_FLAG)

        node "$ACTION_DIR/action-scripts/summarize.mjs" \
          "$GITHUB_WORKSPACE/.slop-scorecard/slop-scorecard-report.json" \
          >> "$GITHUB_STEP_SUMMARY"

        OVERALL=$(node -e "console.log(require('$GITHUB_WORKSPACE/.slop-scorecard/slop-scorecard-report.json').overall)")
        SLOPINDEX=$(node -e "console.log(require('$GITHUB_WORKSPACE/.slop-scorecard/slop-scorecard-report.json').slopIndex)")
        echo "overall-grade=$OVERALL" >> "$GITHUB_OUTPUT"
        echo "slop-index=$SLOPINDEX" >> "$GITHUB_OUTPUT"

    - name: Comment on pull request
      if: ${{ inputs.comment-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        node "${{ github.action_path }}/action-scripts/summarize.mjs" \
          "$GITHUB_WORKSPACE/.slop-scorecard/slop-scorecard-report.json" \
          --markdown > "$RUNNER_TEMP/slop-scorecard-comment.md"
        node "${{ github.action_path }}/action-scripts/postComment.mjs" \
          "$RUNNER_TEMP/slop-scorecard-comment.md"
