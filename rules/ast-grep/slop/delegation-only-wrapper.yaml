# ast-grep rule — ANTI_SLOP R-06: delegation-only wrapper class.
# Structural (AST), narrowed to the canonical shape: a class with an
# empty-bodied constructor and exactly one zero-arg method whose entire
# body is `return this.<dep>.<sameMethodName>()` — pure forwarding, no
# transformation/validation/caching/error-mapping added.
id: bpm-slop-delegation-only-wrapper
language: typescript
severity: hint
rule:
  pattern: |
    class $CLASS {
      constructor($ARGS) {}
      $METHOD() {
        return this.$DEP.$METHOD();
      }
    }
message: >
  delegation-only wrapper class (ANTI_SLOP R-06) adds a type and file for
  zero behavior — it forwards to the dependency with no transformation,
  validation, caching, or error mapping. Inline the dependency call at the
  call site, or add real logic to justify the wrapper.
metadata:
