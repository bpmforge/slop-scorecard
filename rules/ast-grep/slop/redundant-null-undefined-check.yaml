# ast-grep rule — ANTI_SLOP R-09: null checks on types you control.
# Structural (AST), narrowed to the mechanically-detectable core of R-09:
# the redundant compound check `x === null || x === undefined` (or the
# reversed order), which is always equivalent to `x == null` regardless of
# whether the value is internal or boundary — the compound form itself is
# always superfluous.
id: bpm-slop-redundant-null-undefined-check
language: typescript
severity: hint
rule:
  any:
    - pattern: $X === null || $X === undefined
    - pattern: $X === undefined || $X === null
message: >
  redundant null/undefined double-check (ANTI_SLOP R-09) — `x === null ||
  x === undefined` is always equivalent to `x == null`. If the value's
  type is owned by this codebase, fix the type instead of guarding it;
  otherwise use the single loose-equality check.
metadata:
