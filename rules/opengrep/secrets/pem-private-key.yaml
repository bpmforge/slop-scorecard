    languages: [generic]
    severity: ERROR
    message: >
      PEM private key block committed to source. Move to a secrets manager
      or environment variable; rotate the exposed key immediately.
    pattern-regex: '-----BEGIN [A-Z ]*PRIVATE KEY-----'
